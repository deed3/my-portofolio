<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap');
    body { margin: 0; background: #fafafa; font-family: 'Poppins', sans-serif; color: #1a1a1a; overflow-x: hidden; }
    
    header { display: flex; align-items: center; gap: 20px; padding: 40px 70px; }
    header .line { height: 1px; width: 200px; background: #000; }
    header a { text-decoration: none; color: inherit; font-size: 16px; transition: 0.3s; }
    header a:hover { transform: skew(-10deg); font-weight: 500; }

    .page-content { padding: 40px 70px; min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .page-title { font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 500; margin-bottom: 10px; }
    .page-subtitle { font-size: 16px; opacity: 0.7; max-width: 500px; margin: 0 auto 40px; line-height: 1.6;}
    
    .contact-btn { padding: 15px 50px; background: #000; color: #fff; border-radius: 40px; font-size: 18px; text-decoration: none; transition: 0.3s ease; display: inline-flex; align-items: center; gap: 10px; }
    .contact-btn:hover { transform: skew(-10deg) translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1);}

    .social-links { display: flex; gap: 20px; margin-top: 60px; }
    .social-links a { height: 50px; width: 50px; border: 1px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; text-decoration: none; transition: 0.3s; font-size: 20px;}
    .social-links a:hover { background: #000; color: #fff; transform: translateY(-5px); }

    .year { position: fixed; left: 25px; bottom: 50%; transform: rotate(-90deg); font-size: 14px; letter-spacing: 2px; opacity: 0.6; }
    
    @media(max-width: 768px) {
        header { padding: 30px; }
        header .line { width: 100px; }
        .page-content { padding: 30px; }
        .page-title { font-size: 50px; }
    }
  </style>
</head>
<body>
    <header>
      <a href="index.html">Home</a>
      <div class="line"></div>
      <div>Contact</div>
    </header>

    <section class="page-content">
        <h1 class="page-title" data-aos="fade-down">Say Hello.</h1>
        <p class="page-subtitle" data-aos="fade-up" data-aos-delay="100">
            Interested in collaborating on a design or code project? Or just want to chat about tech? Drop me an email.
        </p>
        
        <a href="mailto:hello@email.com" class="contact-btn" data-aos="fade-up" data-aos-delay="200">
            Get in touch <i class="fas fa-paper-plane"></i>
        </a>

        <div class="social-links" data-aos="fade-up" data-aos-delay="300">
            <a href="linkedin.com/in/annisa217/" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://www.instagram.com/everynisspace_" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://github.com/hikarisproject21" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
        </div>
    </section>

    <div class="year">2025</div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, easing: 'ease-in-out', once: true });</script>
</body>
</html>
